<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS scrollIntoView Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
        }

        .container ul {
            list-style: none;
        }

        .container ul li {
            padding: 2rem;
            font-size: 2rem;
        }

        .container ul li:nth-child(even) {
            background-color: #f4f4f4;
            color: #2e302f
        }

        .container a {
            color: black;
            cursor: pointer
        }

        .container a:hover {
            text-decoration: underline;
        }

        .container ul li.special {
            background-color: #f9dc5c;
            color: #2e302f;
            border: solid 2px #2e302f;
        }

        .btn {
            box-sizing: border-box;
            width: 100%;
            padding: 3%;
            font-size: 2rem;
            background: #007bff;
            border-bottom: 2px solid #007bff;
            border-top-style: none;
            border-right-style: none;
            border-left-style: none;
            color: #fff;
        }

        .btn:hover {
            background: #0069d9;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <button class="btn">Scroll Into View</button>
        <ul>
            <li>C</li>
            <li>Java</li>
            <li>Python</li>
            <li>C++</li>
            <li>C#</li>
            <li>Go</li>
            <li>Visual Basic</li>
            <li>JavaScript</li>
            <li>PHP</li>
            <li>SQL</li>
            <li>R</li>
            <li>Swift</li>
            <li class="special">JavaScript</li>
            <li>MATLAB</li>
            <li>Assembly language</li>
            <li>Ruby</li>
            <li>PL/SQL</li>
            <li>Classic Visual Basic</li>
            <li>Perl</li>
            <li>Scratch</li>
            <li>Objective-C</li>
        </ul>
    </div>
    <script>
        let btn = document.querySelector('.btn');
        let el = document.querySelector('.special');

        btn.addEventListener('click', function () {
            el.scrollIntoView({behavior: "smooth", block: "center", inline: "center"});
        });
    </script>
</body>

</html>
