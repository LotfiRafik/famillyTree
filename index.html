            }).finally(
                () => {

                    var i = 0,
                        duration = 0,
                        rectW = 80,
                        rectH = 45;

                    let tree = d3.layout.tree().nodeSize([70, 40]);

                    var diagonal = d3.svg.diagonal()
                        .projection(function (d) {
                            return [d.y + rectH / 2, d.x + rectW / 2];
                        });

                    var svg = d3.select("body").append("svg").append("g")

                    root.x0 = 0;
                    root.y0 = height / 2;

                    function collapse(d) {
                        if (d.children) {
                            d._children = d.children;
                            d._children.forEach(collapse);
                            d.children = null;
                        }

                    }

                    root.children.forEach(collapse);
                    update(root);

                    function update(source) {

                        // Compute the new tree layout.
                        var nodes = tree.nodes(root).reverse(),
                            links = tree.links(nodes);

                        let nbNodesPerDepth = {};

                        // Normalize for fixed-depth.
                        nodes.forEach(function (d) {
                            d.y = d.depth * 180;
                            nbNodesPerDepth[d.depth] = nbNodesPerDepth[d.depth] ? nbNodesPerDepth[d.depth] + 1 : 1
                            // @TODO optimize calcul
                            // max depth
                            // max x
                            // min x
                            // max y
                        });

                        max_depth = Math.max.apply(Math, nodes.map(function (d) { return d.depth; }))
                        if (max_depth) {

                            nb_nodes_minus_root = nodes.length - 1

                            max_x = Math.max.apply(Math, nodes.map(function (d) { return d.x; }))
                            min_x = Math.min.apply(Math, nodes.map(function (d) { return d.x; }))

                            min_max_x = max_x + Math.abs(min_x) + rectH * 2


                            max_y = Math.max.apply(Math, nodes.map(function (d) { return d.y; }))
                            max_y_depth = (180 * max_depth) + (max_depth * rectW) + rectH

                            document.getElementsByTagName("svg")[0].style.width = max_y_depth + "px";
                            document.getElementsByTagName("svg")[0].style.height = min_max_x + "px";

                            document.getElementsByTagName("g")[0].style.transform = "translate(" + 0 + "px," + Math.abs(min_x) + "px)";

                        } else {
                            document.getElementsByTagName("svg")[0].style.width = 200 + "px";
                            document.getElementsByTagName("svg")[0].style.height = 200 + "px";
                            document.getElementsByTagName("g")[0].style.transform = "translate(" + 1 + "px," + 1 + "px)";
                        }


                        // Update the nodes…
                        var node = svg.selectAll("g.node")
                            .data(nodes, function (d) {
                                return d.id;
                            });


                        // Enter any new nodes at the parent's previous position.
                        var nodeEnter = node.enter().append("g")
                            .attr("class", "node")
                            .attr("transform", function (d) {
                                return "translate(" + source.y0 + "," + source.x0 + ")";
                            })
                            .on("click", click);

                        nodeEnter.append("rect")
                            .attr("width", rectW)
                            .attr("height", rectH)
                            .attr("stroke", "black")
                            .attr("stroke-width", 1)
                            .style("fill", function (d) {
                                return d._children ? "lightsteelblue" : "#fff";
                            });

                        nodeEnter.append("text")
                            .attr("x", rectW / 2)
                            .attr("y", rectH / 2)
                            .attr("dy", ".35em")
                            .attr("text-anchor", "middle")
                            .text(function (d) {
                                return d.name;
                            });

                        // Transition nodes to their new position.
                        var nodeUpdate = node.transition()
                            .duration(duration)
                            .attr("transform", function (d) {
                                return "translate(" + d.y + "," + d.x + ")";
                            });

                        nodeUpdate.select("rect")
                            .attr("width", rectW)
                            .attr("height", rectH)
                            .attr("stroke", "black")
                            .attr("stroke-width", 1)
                            .style("fill", function (d) {
                                return d._children ? "lightsteelblue" : "#fff";
                            });

                        nodeUpdate.select("text")
                            .style("fill-opacity", 1);

                        // Transition exiting nodes to the parent's new position.
                        var nodeExit = node.exit().transition()
                            .duration(duration)
                            .attr("transform", function (d) {
                                return "translate(" + source.y + "," + source.x + ")";
                            })
                            .remove();

                        nodeExit.select("rect")
                            .attr("width", rectW)
                            .attr("height", rectH)
                            .attr("stroke", "black")
                            .attr("stroke-width", 1);

                        nodeExit.select("text");

                        // Update the links…
                        var link = svg.selectAll("path.link")
                            .data(links, function (d) {
                                return d.target.id;
                            });

                        // Enter any new links at the parent's previous position.
                        link.enter().insert("path", "g")
                            .attr("class", "link")
                            .attr("x", rectW / 2)
                            .attr("y", rectH / 2)
                            .attr("d", function (d) {
                                var o = {
                                    x: source.x0,
                                    y: source.y0
                                };
                                return diagonal({
                                    source: o,
                                    target: o
                                });
                            });

                        // Transition links to their new position.
                        link.transition()
                            .duration(duration)
                            .attr("d", diagonal);

                        // Transition exiting nodes to the parent's new position.
                        link.exit().transition().duration(duration)
                            .attr("d", function (d) {
                                var o = {
                                    x: source.x,
                                    y: source.y
                                };
                                return diagonal({
                                    source: o,
                                    target: o
                                });
                            })
                            .remove();

                        // Stash the old positions for transition.
                        nodes.forEach(function (d) {
                            d.x0 = d.x;
                            d.y0 = d.y;
                        });

                        window.scrollTo({
                            top: source.x + Math.abs(min_x) + rectH - window.innerHeight / 2,
                            left: source.y,
                            behavior: 'auto'
                        });

                    }

                    // Toggle children on click.
                    function click(d) {

                        console.log(this)
                        console.log(d)
                        if (d.children) {
                            collapse(d)
                            // d._children = d.children;
                            // d.children = null;
                        } else if (d._children) {
                            d.children = d._children;
                            d._children = null;
                        }
                        else {
                            return;
                        }
                        update(d);

                    }

                    //Redraw for zoom
                    function redraw() {
                        console.log("here", d3.event.translate, d3.event.scale);
                        svg.attr("transform",
                            "translate(" + d3.event.translate + ")"
                            + " scale(" + d3.event.scale + ")");
                    }
